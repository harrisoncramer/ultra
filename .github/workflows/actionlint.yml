---
# Lints the GitHub Actions workflows with actionlint, on pull requests targeting
# main and on pushes to main.
name: Actionlint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: actionlint-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Mise
        uses: ./.github/actions/use-mise

      - run: mise run lint-actions
