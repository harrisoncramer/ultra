---
# Runs the Go checks (build, test, lint) on pull requests targeting main.
name: Golang CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: golang-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Mise
        uses: ./.github/actions/use-mise

      - name: Use Caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - run: mise run build

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Mise
        uses: ./.github/actions/use-mise

      - name: Use Caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - run: mise run test

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Mise
        uses: ./.github/actions/use-mise

      - name: Use Caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ~/go/pkg/mod
          key: golangci-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            golangci-${{ runner.os }}-

      - run: mise run lint
